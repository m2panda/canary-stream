services:
  # -----------------------
  # Backend
  # -----------------------

  postgres-db:
    container_name: cs-pgdb
    image: postgres:18-alpine
    restart: unless-stopped
    expose:
      - "${DB_PORT}"
    networks:
      - cs_net
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
  valkey-caching:
    container_name: cs-vkcache
    image: valkey/valkey:9.1-alpine
    restart: unless-stopped
    expose:
      - "${CACHE_PORT}"
    networks:
      - cs_net
    volumes:
      - vkdata:/data
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M
  golang-api:
    container_name: cs-goapi
    restart: unless-stopped
    expose:
      - "${API_PORT}"
    build:
      context: ./backend/
      dockerfile: Dockerfile
      target: production
      args:
        - API_PORT=${API_PORT}
    networks:
      - cs_net
    environment:
      - API_PORT=${API_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CACHE_HOST=${CACHE_HOST}
      - CACHE_PORT=${CACHE_PORT}
      - ENVIRONMENT=production
    depends_on:
      - postgres-db
      - valkey-caching

  # -----------------------
  # Log monitory
  # -----------------------

  vector-logs:
    container_name: cs-vector
    restart: unless-stopped
    build:
      context: ./logs/
      dockerfile: Dockerfile
    volumes:
      - ./logs/config/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/data:/var/log/canary_stream
    deploy:
      resources:
        limits:
          memory: 65M

volumes:
  pgdata:
  vkdata:

networks:
  cs_net:
    driver: bridge
